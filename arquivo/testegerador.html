<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerador de Notícias | CAMG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="../assets/images/favicon.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0f11;
      --surface: #16181c;
      --surface2: #1e2026;
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.13);
      --accent: #e8b84b;
      --accent2: #c9982a;
      --text: #f0ede8;
      --muted: #7a7d85;
      --muted2: #555860;
      --success: #4caf82;
      --font-display: 'Barlow Condensed', sans-serif;
      --font-body: 'Barlow', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 15px;
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ── Header ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      position: sticky;
      top: 0;
      background: rgba(14,15,17,0.92);
      backdrop-filter: blur(12px);
      z-index: 10;
    }
    .logo {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 22px;
      letter-spacing: 0.06em;
      color: var(--accent);
      text-transform: uppercase;
    }
    .logo span { color: var(--text); font-weight: 400; }
    .header-badge {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      border: 1px solid var(--border2);
      padding: 4px 10px;
      border-radius: 4px;
    }

    /* ── Layout ── */
    .wrapper {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2.5rem 2rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      align-items: start;
    }
    @media (max-width: 780px) {
      .wrapper { grid-template-columns: 1fr; padding: 1.5rem 1rem; }
    }

    /* ── Panel ── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    .panel-head {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .panel-head-icon {
      width: 28px; height: 28px;
      background: var(--accent);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .panel-head-icon svg { width: 14px; height: 14px; fill: #000; }
    .panel-head h2 {
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text);
    }
    .panel-body { padding: 20px; display: flex; flex-direction: column; gap: 16px; }

    /* ── Fields ── */
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }
    input[type="text"], textarea {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      padding: 9px 12px;
      transition: border-color .15s;
      width: 100%;
      outline: none;
    }
    input[type="text"]:focus, textarea:focus { border-color: var(--accent); }
    input::placeholder, textarea::placeholder { color: var(--muted2); }
    textarea { resize: vertical; min-height: 130px; line-height: 1.6; }

    .field-hint {
      font-size: 11px;
      color: var(--muted);
    }
    .field-hint code {
      font-family: monospace;
      color: var(--accent);
      font-size: 11px;
    }

    /* ── Tag pills ── */
    .tag-pills { display: flex; gap: 6px; flex-wrap: wrap; }
    .pill {
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 4px;
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all .15s;
    }
    .pill:hover { border-color: var(--accent); color: var(--accent); }
    .pill.active { background: var(--accent); color: #000; border-color: var(--accent); }

    /* ── Output panel ── */
    .output-panel {
      position: sticky;
      top: 80px;
    }
    .code-scroll {
      padding: 16px 20px;
      background: #0a0b0d;
      font-family: 'Courier New', monospace;
      font-size: 11.5px;
      line-height: 1.7;
      color: #c5c8cc;
      white-space: pre;
      overflow-x: auto;
      max-height: 520px;
      overflow-y: auto;
    }
    .code-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
    .code-scroll::-webkit-scrollbar-track { background: transparent; }
    .code-scroll::-webkit-scrollbar-thumb { background: var(--muted2); border-radius: 3px; }

    /* syntax hint colors */
    .code-scroll .t-tag { color: #e06c75; }
    .code-scroll .t-attr { color: #e8b84b; }
    .code-scroll .t-val { color: #98c379; }
    .code-scroll .t-comment { color: #5c6370; font-style: italic; }

    /* ── Action bar ── */
    .action-bar {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .btn-copy {
      display: flex;
      align-items: center;
      gap: 7px;
      background: var(--accent);
      color: #000;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 9px 18px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background .15s, transform .1s;
    }
    .btn-copy:hover { background: #f0c85c; }
    .btn-copy:active { transform: scale(0.97); }
    .btn-copy svg { width: 14px; height: 14px; fill: #000; flex-shrink: 0; }

    .btn-reset {
      display: flex;
      align-items: center;
      gap: 7px;
      background: transparent;
      color: var(--muted);
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 13px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 9px 14px;
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      transition: all .15s;
    }
    .btn-reset:hover { border-color: var(--border2); color: var(--text); }
    .btn-reset svg { width: 14px; height: 14px; stroke: currentColor; fill: none; }

    .ok-msg {
      font-size: 13px;
      font-weight: 600;
      color: var(--success);
      display: none;
      align-items: center;
      gap: 6px;
      margin-left: auto;
    }
    .ok-msg svg { width: 15px; height: 15px; stroke: var(--success); fill: none; }

    /* ── Path hint ── */
    .path-hint {
      margin: 0 20px 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 12px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .path-hint svg { width: 14px; height: 14px; stroke: var(--accent); fill: none; flex-shrink: 0; }
    .path-hint code { color: var(--accent); font-family: monospace; font-size: 11px; }

    /* ── Row split ── */
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 500px) { .row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<header>
  <div class="logo">CAMG <span>· Gerador de Notícias</span></div>
  <div class="header-badge">Backoffice</div>
</header>

<div class="wrapper">

  <!-- FORMULÁRIO -->
  <div class="panel">
    <div class="panel-head">
      <div class="panel-head-icon">
        <svg viewBox="0 0 16 16"><path d="M2 3h12v1H2zm0 3h8v1H2zm0 3h10v1H2zm0 3h6v1H2z"/></svg>
      </div>
      <h2>Dados da notícia</h2>
    </div>
    <div class="panel-body">

      <div class="field">
        <label>Tag da categoria</label>
        <input type="text" id="f-tag" value="MILHA" oninput="syncTag(); update()">
        <div class="tag-pills" id="tag-pills">
          <button class="pill active" onclick="setTag(this,'MILHA')">MILHA</button>
          <button class="pill" onclick="setTag(this,'FUTEBOL')">FUTEBOL</button>
          <button class="pill" onclick="setTag(this,'BASQUETE')">BASQUETE</button>
          <button class="pill" onclick="setTag(this,'ATLETISMO')">ATLETISMO</button>
          <button class="pill" onclick="setTag(this,'NATAÇÃO')">NATAÇÃO</button>
          <button class="pill" onclick="setTag(this,'CLUBE')">CLUBE</button>
        </div>
      </div>

      <div class="field">
        <label>Título da notícia</label>
        <input type="text" id="f-title" placeholder="ex: CAMG vence Milha de Cristal 2026" oninput="update()">
      </div>

      <div class="field">
        <label>Pré-descrição (lead)</label>
        <input type="text" id="f-lead" placeholder="Breve resumo que aparece por baixo do título" oninput="update()">
      </div>

      <div class="row">
        <div class="field">
          <label>Nome do ficheiro de imagem</label>
          <input type="text" id="f-img" placeholder="ex: milha-cristal-2026.jpg" oninput="update()">
          <div class="field-hint">Pasta: <code>assets/images/news/</code></div>
        </div>
        <div class="field">
          <label>Alt text da imagem</label>
          <input type="text" id="f-alt" placeholder="Descrição da imagem" oninput="update()">
        </div>
      </div>

      <div class="field">
        <label>Conteúdo do artigo</label>
        <textarea id="f-content" placeholder="Escreve o corpo da notícia aqui. Separa parágrafos com uma linha em branco."></textarea>
        <div class="field-hint">Linha em branco entre texto → cria parágrafos separados <code>&lt;p&gt;</code></div>
      </div>

    </div>
  </div>

  <!-- OUTPUT -->
  <div class="panel output-panel">
    <div class="panel-head">
      <div class="panel-head-icon">
        <svg viewBox="0 0 16 16"><path d="M4 2h8a1 1 0 011 1v10a1 1 0 01-1 1H4a1 1 0 01-1-1V3a1 1 0 011-1zm1 3h6v1H5zm0 3h6v1H5zm0 3h4v1H5z"/></svg>
      </div>
      <h2>HTML gerado</h2>
    </div>

    <div class="path-hint">
      <svg viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12.75V12A2.25 2.25 0 014.5 9.75h15A2.25 2.25 0 0121.75 12v.75m-8.69-6.44l-2.12-2.12a1.5 1.5 0 00-1.061-.44H4.5A2.25 2.25 0 002.25 6v12a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9a2.25 2.25 0 00-2.25-2.25h-5.379a1.5 1.5 0 01-1.06-.44z"/></svg>
      Guardar em: <code>noticias<em>/ano-letivo-atual</em>/nome-da-noticia.html</code>
    </div>

    <div class="code-scroll" id="output"></div>

    <div class="action-bar">
      <button class="btn-copy" onclick="copyCode()">
        <svg viewBox="0 0 16 16"><path d="M4 4h8v1H4zm0 2h8v1H4zm0 2h6v1H4z"/><path d="M2 1h9l3 3v11H2V1zm8 0v3h3"/></svg>
        Copiar HTML
      </button>
      <button class="btn-reset" onclick="resetForm()">
        <svg viewBox="0 0 24 24" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99"/></svg>
        Limpar
      </button>
      <span class="ok-msg" id="ok-msg">
        <svg viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/></svg>
        Copiado!
      </span>
    </div>
  </div>

</div>

<script>
  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  function buildParagraphs(text) {
    if (!text.trim()) return '    <p>CONTEÚDO</p>';
    return text.trim()
      .split(/\n\s*\n/)
      .map(p => '    <p>' + p.trim().replace(/\n/g,' ') + '</p>')
      .join('\n');
  }

  function update() {
    const tag     = document.getElementById('f-tag').value.trim() || 'MILHA';
    const title   = document.getElementById('f-title').value.trim() || 'TÍTULO DA NOTÍCIA';
    const lead    = document.getElementById('f-lead').value.trim() || 'PRÉ-DESCRIÇÃO';
    const img     = document.getElementById('f-img').value.trim();
    const alt     = document.getElementById('f-alt').value.trim() || esc(title);
    const content = document.getElementById('f-content').value;
    const imgSrc  = '../../assets/images/news/' + (img || '');
    const paras   = buildParagraphs(content);
    const pageTitle = title !== 'TÍTULO DA NOTÍCIA' ? title + ' | CAMG' : ' | CAMG';

    const html =
`<!DOCTYPE html>
<html lang="pt">
<head>
<head>
    <!-- Metadados -->
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="author" content="Makyneta Unipessoal, Lda.">
        <meta name="og:image" content="${esc(imgSrc)}">
        <meta name="twitter:image" content="${esc(imgSrc)}">
    <!-- Styles -->
        <link rel="stylesheet" href="../../assets/styles/loading.css">
        <link rel="stylesheet" href="../../assets/styles/layout.css">
        <link rel="stylesheet" href="../../assets/styles/noticia.css">
    <!-- Script -->
        <script src="../../assets/scripts/loading.js"><\/script>
        <script src="../../assets/scripts/layout.js" defer><\/script>
    <!-- Title & Favicon -->
        <title>${esc(pageTitle)}</title>
        <link rel="icon" type="image/png" href="../../assets/images/favicon.png">
</head>

<body>

<div class="article-nav">
  <div class="nav-container">
    <a href="../../noticias" class="back-btn">← Voltar às Notícias</a>
  </div>
</div>

<article class="article-container">
  <header class="article-header">
    <span class="article-tag">${esc(tag)}</span>
    <h1>${esc(title)}</h1>
    <p class="article-lead">${esc(lead)}</p>
  </header>

  <div class="article-main-image">
    <img src="${esc(imgSrc)}" alt="${esc(alt)}">
  </div>

  <div class="article-content">
${paras}
  </div>
</article>

</body>
</html>`;

    document.getElementById('output').textContent = html;
  }

  function setTag(el, val) {
    document.getElementById('f-tag').value = val;
    document.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    update();
  }

  function syncTag() {
    const val = document.getElementById('f-tag').value.trim().toUpperCase();
    document.querySelectorAll('.pill').forEach(b => {
      b.classList.toggle('active', b.textContent === val);
    });
  }

  async function copyCode() {
    const code = document.getElementById('output').textContent;
    try {
      await navigator.clipboard.writeText(code);
    } catch(e) {
      const ta = document.createElement('textarea');
      ta.value = code;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    }
    const msg = document.getElementById('ok-msg');
    msg.style.display = 'flex';
    setTimeout(() => msg.style.display = 'none', 2500);
  }

  function resetForm() {
    ['f-title','f-lead','f-img','f-alt','f-content'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.getElementById('f-tag').value = 'MILHA';
    document.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
    document.querySelector('.pill').classList.add('active');
    update();
  }

  update();
</script>
</body>
</html>
