<!DOCTYPE html>
<html lang="pt">
<head>
    <!-- Metadados -->
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="author" content="Makyneta Unipessoal, Lda.">
    <!-- Styles -->
        <link rel="stylesheet" href="assets/styles/layout.css">
        <link rel="stylesheet" href="assets/styles/contacto.css">
    <!-- Direct Styles -->
        <style>
        .sociais-section .social-item .social-icon {
            color: #ffffff;       /* Define a cor branca */
            font-size: 40px;      /* Define o tamanho do logotipo */
            transition: opacity 0.3s; /* Efeito suave ao passar o mouse */
            cursor: pointer;
        }

        .sociais-section .social-item .social-icon:hover {
            opacity: 0.8; /* Efeito de hover */
        }
        </style>
    <!-- Font -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Script -->
        <script src="assets/scripts/layout.js" defer></script>
    <!-- Title & Favicon -->
        <title>Contacto | Clube de Atletismo da Marinha Grande</title>
        <link rel="icon" type="image/png" href="assets/images/favicon.png">
</head>
<body>

<div class="page-header">
  <h1>📞 Contacte</h1>
  <!-- <p style="font-size: 1.1rem; margin-top: 12px; color: rgba(255,255,255,.9);">Estamos aqui para ajudar</p> -->
</div>

<div class="container">
  <div class="contact-grid">
    <div class="contact-info">
      <div class="contact-item">
        <div class="ci">📍</div>
        <div>
          <h5>Localização</h5>
          <p>Estádio Municipal da Marinha Grande</p>
        </div>
      </div>
      <div class="contact-item">
        <div class="ci">📞</div>
        <div>
          <h5>Telefone</h5>
          <p><a href="tel:+351928119160">+351 928 119 160</a></p>
        </div>
      </div>
      <div class="contact-item">
        <div class="ci">✉️</div>
        <div>
          <h5>Email</h5>
          <p><a href="mailto:catletismomg@gmail.com">catletismomg@gmail.com</a></p>
        </div>
      </div>
      <!-- <div class="contact-item">
        <div class="ci">🕐</div>
        <div>
          <h5>Horário</h5>
          <p><strong>Seg-Sex:</strong> 09h-20h<br><strong>Sábado:</strong> 09h-14h<br><strong>Domingo:</strong> Fechado</p>
        </div>
      </div> -->
    </div>

    <div class="contact-form">
      <input type="text" placeholder="Nome completo" required>
      <input type="email" placeholder="Seu email" required>
      <input type="tel" placeholder="Contacto (opcional)">
      <select required>
        <option value="">Seleccione o assunto</option>
        <option value="geral">Informações Gerais</option>
        <option value="inscricao">Inscrição</option>
        <option value="treinos">Treinos</option>
        <option value="competicoes">Competições</option>
        <option value="meeting">12º Meeting F. Alves</option>
        <option value="outro">Outro</option>
      </select>
      <textarea rows="5" placeholder="Mensagem..." required></textarea>
      <button>Enviar Mensagem ✉️</button>
    </div>
  </div>

  <!-- REDES SOCIAIS -->
  <div class="sociais-section">
    <h3>Siga-nos nas Redes Sociais</h3>
    <div class="sociais">
      <a href="instagram" target="_blank" class="social-item instagram">
        <div class="social-icon"><i class="fa-brands fa-instagram"></i></div>
        <span>Instagram</span>
      </a>
      <a href="facebook" target="_blank" class="social-item facebook">
        <div class="social-icon"><i class="fa-brands fa-facebook"></i></div>
        <span>Facebook</span>
      </a>
      <a href="youtube" target="_blank" class="social-item youtube">
        <div class="social-icon"><i class="fa-brands fa-youtube"></i></div>
        <span>YouTube</span>
      </a>
    </div>
  </div>
</div>
</body>
</html>
