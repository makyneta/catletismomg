<!DOCTYPE html>
<html lang="pt">
<head>
    <!-- Metadados -->
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="Página em construção do Clube de Atletismo de Marinha Grande">
        <meta name="keywords" content="CAMG, Clube de Atletismo, Marinha Grande, atletismo, corrida, pista, em construção">
        <meta name="author" content="Makyneta Unipessoal, Lda.">
    <!-- Styles -->
        <link rel="stylesheet" href="assets/styles/loading.css">
        <link rel="stylesheet" href="assets/styles/layout.css">
        <link rel="stylesheet" href="assets/styles/index.css">
    <!-- Script -->
        <script src="assets/scripts/loading.js"></script>
        <script src="assets/scripts/layout.js" defer></script>
        <script src="assets/scripts/slideshow.js" defer></script>
    <!-- Title & Favicon -->
        <title>Clube Atletismo da Marinha Grande</title>
        <link rel="icon" type="image/png" href="assets/images/favicon.png">
</head>
<body>
<section class="hero" id="inicio">
 
  <!-- SLIDESHOW DE FUNDO -->
  <div class="slideshow" id="slideshow" aria-hidden="true">
    <div class="slide active">
      <img src="assets/images/slideshow/maos-juntas.jpg" alt="">
    </div>
    <div class="slide">
      <img src="assets/images/slideshow/partida-dois.jpg" alt="">
    </div>
    <div class="slide">
      <img src="assets/images/slideshow/partida-todos.jpg" alt="">
    </div>
  </div>
 
  <!-- OVERLAY GRADIENTE -->
  <div class="hero-overlay"></div>
 
  <!-- BARRA DE PROGRESSO -->
  <div class="hero-progress-bar" id="progressBar" aria-hidden="true">
    <div class="hero-progress-fill" id="progressFill"></div>
  </div>
 
  <!-- CONTEÚDO PRINCIPAL -->
  <div class="hero-content">
    <div class="hero-badge">
      <img src="assets/images/logo.png" alt="Logótipo do Clube Atletismo da Marinha Grande">
    </div>
    <p class="hero-eyebrow">Fundado em 1995 &middot; Marinha Grande</p>
    <h1>Clube Atletismo De<br><span>Marinha Grande</span></h1>
    <p class="hero-sub">Excelência &middot; Disciplina &middot; Paixão pelo Atletismo</p>
    <div class="hero-btns">
      <a href="sobre" class="btn-primary">Informações</a>
      <a href="contacto" class="btn-outline">Contacto</a>
    </div>
  </div>
 
  <!-- INDICADORES DE SLIDE (DOTS) -->
  <div class="hero-dots" id="heroDots" role="tablist" aria-label="Navegação de slides"></div>
 <br>
  <!-- STATS NA BASE DA HERO -->
  <div class="hero-stats">
    <div class="hero-stat">
      <strong>+30</strong>
      <span>Anos de Tradição</span>
    </div>
    <div class="hero-stat">
      <strong>+100</strong>
      <span>Atletas Ativos</span>
    </div>
    <div class="hero-stat">
      <strong>+300</strong>
      <span>Medalhas</span>
    </div>
  </div>
 
</section>
</body>
</html>
