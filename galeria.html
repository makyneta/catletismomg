<!DOCTYPE html>
<html lang="pt">
<head>
    <!-- Metadados -->
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="author" content="Makyneta Unipessoal, Lda.">
    <!-- Styles -->
        <link rel="stylesheet" href="assets/styles/loading.css">
        <link rel="stylesheet" href="assets/styles/layout.css">
        <link rel="stylesheet" href="assets/styles/galeria.css">
    <!-- Script -->
        <script src="assets/scripts/loading.js"></script>
        <script src="assets/scripts/layout.js" defer></script>
        <script src="assets/scripts/galeria.js" defer></script>
    <!-- Title & Favicon -->
        <title>Galeria | CAMG</title>
        <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body>

<!-- ══════════════════════════════════ HERO -->
<section class="museum-hero">
  <div class="museum-hero-bg"></div>
  <div class="museum-hero-content">
    <div class="museum-hero-label">Arquivo Visual</div>
    <h1>Galeria <span>CAMG</span></h1>
    <p>Momentos marcantes do Clube de Atletismo de Marinha Grande</p>
    <div class="museum-hero-stats">
      <div class="mh-stat" id="statFotos"><span>—</span><small>Fotografias</small></div>
      <div class="mh-divider"></div>
      <div class="mh-stat" id="statVideos"><span>—</span><small>Vídeos</small></div>
      <div class="mh-divider"></div>
      <div class="mh-stat" id="statColecoes"><span>—</span><small>Coleções</small></div>
    </div>
  </div>
  <div class="museum-hero-scroll">
    <span>Explorar</span>
    <div class="scroll-arrow"></div>
  </div>
</section>

<!-- ══════════════════════════════════ FILTROS -->
<div class="museum-filters" id="museumFilters">
  <div class="filters-inner">
    <button class="filter-btn active" data-filter="all">Tudo</button>
    <!-- gerado dinamicamente pelo JS com base nas colecoes -->
  </div>
</div>

<!-- ══════════════════════════════════ GALERIA -->
<main class="museum-main">

  <!-- As coleções são geradas pelo JS a partir do array museumData em galeria.js -->
  <div id="museumGallery"></div>

</main>

<!-- ══════════════════════════════════ LIGHTBOX -->
<div id="lightbox" class="lightbox" role="dialog" aria-modal="true" aria-label="Visualizador de media">
  <div class="lb-backdrop" id="lbBackdrop"></div>

  <button class="lb-close" id="lbClose" aria-label="Fechar">✕</button>
  <button class="lb-nav lb-prev" id="lbPrev" aria-label="Anterior">&#8249;</button>
  <button class="lb-nav lb-next" id="lbNext" aria-label="Próximo">&#8250;</button>

  <div class="lb-stage">
    <div class="lb-media" id="lbMedia"></div>
    <div class="lb-info">
      <div class="lb-counter" id="lbCounter"></div>
      <h2 class="lb-title" id="lbTitle"></h2>
      <p class="lb-desc"  id="lbDesc"></p>
      <div class="lb-tag"  id="lbTag"></div>
    </div>
  </div>

  <!-- Strip de miniaturas -->
  <div class="lb-strip" id="lbStrip"></div>
</div>

</body>
</html>
