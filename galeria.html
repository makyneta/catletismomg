<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Galeria de fotos e vídeos do Clube de Atletismo de Marinha Grande. Recorde os melhores momentos das provas, treinos e eventos do CAMG.">
    <meta name="author" content="Makyneta Unipessoal, Lda.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://catletismomg.pt/galeria.html">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Galeria | CAMG">
    <meta property="og:description" content="Galeria de fotos e vídeos do Clube de Atletismo de Marinha Grande.">
    <meta property="og:url" content="https://catletismomg.pt/galeria.html">
    <meta property="og:image" content="https://catletismomg.pt/assets/images/logo.png">
    <meta property="og:site_name" content="CAMG — Clube de Atletismo de Marinha Grande">
    <meta property="og:locale" content="pt_PT">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Galeria | CAMG">
    <meta name="twitter:description" content="Galeria de fotos e vídeos do Clube de Atletismo de Marinha Grande.">
    <meta name="twitter:image" content="https://catletismomg.pt/assets/images/logo.png">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "CollectionPage",
      "name": "Galeria CAMG",
      "description": "Galeria de fotos e vídeos do Clube de Atletismo de Marinha Grande.",
      "url": "https://catletismomg.pt/galeria.html",
      "isPartOf": {
        "@type": "SportsOrganization",
        "name": "Clube de Atletismo de Marinha Grande",
        "url": "https://catletismomg.pt"
      }
    }
    </script>
    <!-- Styles -->
        <link rel="stylesheet" href="assets/styles/loading.css">
        <link rel="stylesheet" href="assets/styles/layout.css">
        <link rel="stylesheet" href="assets/styles/galeria.css">
    <!-- Script -->
        <script src="assets/scripts/loading.js"></script>
        <script src="assets/scripts/layout.js" defer></script>
        <script src="assets/scripts/galeria.js" defer></script>
    <!-- Title & Favicon -->
        <title>Galeria | CAMG</title>
        <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body>

<!-- ═══════════════ HERO + FILTROS -->
<section class="galeria-hero">
  <h1>Galeria <span>CAMG</span></h1>
  <div class="galeria-hero-stats">
    <div class="mh-stat" id="statFotos"><span>—</span><small>Fotografias</small></div>
    <div class="mh-divider"></div>
    <div class="mh-stat" id="statVideos"><span>—</span><small>Vídeos</small></div>
    <div class="mh-divider"></div>
    <div class="mh-stat" id="statColecoes"><span>—</span><small>Coleções</small></div>
  </div>
  <div class="galeria-filters" id="museumFilters">
    <div class="filters-inner">
      <button class="filter-btn active" data-filter="all">Tudo</button>
    </div>
  </div>
</section>

<!-- ═══════════════ GALERIA -->
<main class="galeria-main">
  <div id="museumGallery"></div>
</main>

<!-- ═══════════════ LIGHTBOX -->
<div id="lightbox" class="lightbox" role="dialog" aria-modal="true" aria-label="Visualizador de media">

  <button class="lb-close" id="lbClose" aria-label="Fechar">✕</button>
  <button class="lb-nav lb-prev" id="lbPrev" aria-label="Anterior">‹</button>
  <button class="lb-nav lb-next" id="lbNext" aria-label="Seguinte">›</button>

  <div class="lb-backdrop" id="lbBackdrop"></div>

  <div class="lb-stage">
    <div class="lb-media" id="lbMedia"></div>
    <div class="lb-info">
      <h2 class="lb-title" id="lbTitle"></h2>
      <span class="lb-counter" id="lbCounter"></span>
    </div>
  </div>

</div>

</body>
</html>
