<!DOCTYPE html>
<html lang="pt"
<head>
    <!-- Metadados -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Makyneta Unipessoal, Lda.">
    
    <!-- Styles -->
    <link rel="stylesheet" href="assets/styles/layout.css">
    <link rel="stylesheet" href="assets/styles/galeria.css">
    
    <!-- Script -->
    <script src="assets/scripts/layout.js" defer></script>
    <script src="assets/scripts/galeria.js" defer></script>
    
    <!-- Title & Favicon -->
    <title>Galeria | Clube de Atletismo da Marinha Grande</title>
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
</head>
<body>

<div class="page-header">
  <h1>Galeria CAMG</h1>
  <p>Momentos marcantes do Clube de Atletismo da Marinha Grande</p>
</div>

<div class="container">
  <div class="gallery-grid" id="galleryGrid">
    
    <div class="gallery-item large" onclick="openModal(0)">
      <img src="assets/images/gallery/DSC01290.JPG" alt="9º Meeting Jovem" loading="lazy">
      <div class="gallery-overlay">
        <h3>9º Meeting Jovem</h3>
        <span class="view-btn">Ver Imagem →</span>
      </div>
    </div>

    <div class="gallery-item" onclick="openModal(1)">
      <img src="assets/images/gallery/DSC01335.JPG" alt="Equipa Jovem" loading="lazy">
      <div class="gallery-overlay">
        <h3>Equipa Jovem</h3>
        <span class="view-btn">Ver Imagem →</span>
      </div>
    </div>

    <div class="gallery-item medium" onclick="openModal(2)">
      <img src="assets/images/gallery/DSC01524.JPG" alt="12º Meeting Fernando Alves" loading="lazy">
      <div class="gallery-overlay">
        <h3>12º Meeting Fernando Alves</h3>
        <span class="view-btn">Ver Imagem →</span>
      </div>
    </div>

    <div class="gallery-item" onclick="openModal(3)">
      <img src="assets/images/gallery/galeria_2-1024x683.jpg" alt="200 Metros" loading="lazy">
      <div class="gallery-overlay">
        <h3>200 Metros</h3>
        <span class="view-btn">Ver Imagem →</span>
      </div>
    </div>

  </div>
</div>

<!-- MODAL -->
<div id="imageModal" class="modal">
  <div class="modal-nav">
    <button onclick="previousImage()" title="Anterior">‹</button>
    <button onclick="nextImage()" title="Próximo">›</button>
  </div>
  
  <div class="modal-content">
    <span class="close-modal" onclick="closeModal()">&times;</span>
    <img id="modalImage" src="" alt="" loading="lazy">
    <div class="modal-info">
      <h2 class="modal-title" id="modalTitle"></h2>
      <p class="modal-description" id="modalDescription"></p>
    </div>
  </div>

  <div class="modal-counter">
    <span id="imageCounter">1 de 4</span>
  </div>
</div>

</body>
</html>
