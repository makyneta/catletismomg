<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Torne-se sócio do Clube de Atletismo de Marinha Grande. Preencha o formulário de inscrição e faça parte da nossa família desportiva.">
    <meta name="author" content="Makyneta Unipessoal, Lda.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://catletismomg.pt/inscricao/socio.html">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Inscrição de Sócio | CAMG">
    <meta property="og:description" content="Torne-se sócio do Clube de Atletismo de Marinha Grande.">
    <meta property="og:url" content="https://catletismomg.pt/inscricao/socio.html">
    <meta property="og:image" content="https://catletismomg.pt/assets/images/logo.png">
    <meta property="og:site_name" content="CAMG — Clube de Atletismo de Marinha Grande">
    <meta property="og:locale" content="pt_PT">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Inscrição de Sócio | CAMG">
    <meta name="twitter:description" content="Torne-se sócio do Clube de Atletismo de Marinha Grande.">
    <meta name="twitter:image" content="https://catletismomg.pt/assets/images/logo.png">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebPage",
      "name": "Inscrição de Sócio",
      "description": "Formulário de inscrição para novos sócios do Clube de Atletismo de Marinha Grande.",
      "url": "https://catletismomg.pt/inscricao/socio.html",
      "isPartOf": {
        "@type": "SportsOrganization",
        "name": "Clube de Atletismo de Marinha Grande",
        "url": "https://catletismomg.pt"
      }
    }
    </script>
    <!-- Styles -->
        <link rel="stylesheet" href="../assets/styles/loading.css">
        <link rel="stylesheet" href="../assets/styles/layout.css">
        <link rel="stylesheet" href="../assets/styles/socio.css">
    <!-- Script -->
        <script src="../assets/scripts/loading.js"></script>
        <script src="../assets/scripts/layout.js" defer></script>
    <!-- Title & Favicon -->
        <title>Inscrição de Sócio | CAMG</title>
        <link rel="icon" type="image/x-icon" href="/favicon.ico">
</head>
<body>

<section class="socio-hero">
  <h1>Faça-se <span>Sócio</span></h1>
  <p>Ao tornar-se sócio, ajuda a manter vivo o atletismo na nossa comunidade.</p>
</section>

<main class="socio-main">

  <div class="socio-grid">

    <div class="socio-sidebar">
      <div class="levels-stack">
        <button class="level-card" data-value="socio-atleta" onclick="selectLevel(this)">
          <div class="level-badge">Categoria 01</div>
          <h3>Sócio Atleta</h3>
          <p class="level-desc">Para praticantes federados que queiram representar o CAMG em competições oficiais.</p>
          <div class="level-footer">
            <span class="level-price">— €</span>
            <span class="level-tag">a definir</span>
          </div>
        </button>
        <button class="level-card" data-value="socio-apoiante" onclick="selectLevel(this)">
          <div class="level-badge">Categoria 02</div>
          <h3>Sócio Apoiante</h3>
          <p class="level-desc">Para quem quer apoiar o clube sem ser praticante — torne-se parte da família CAMG.</p>
          <div class="level-footer">
            <span class="level-price">— €</span>
            <span class="level-tag">a definir</span>
          </div>
        </button>
      </div>
    </div>

    <div class="form-wrapper">
      <div class="form-header">
        <h2>Formulário de Inscrição</h2>
        <p>Preencha os seus dados para formalizar a admissão como sócio.</p>
      </div>

      <div id="form-status" class="form-status"></div>

      <form action="https://formspree.io/f/mlgkzjny" method="POST" class="premium-form" id="socio-form">
        <input type="hidden" name="_subject" value="Nova Inscrição de Sócio CAMG">
        <input type="hidden" name="_redirect" value="https://catletismomg.pt/inscricao/socio.html?sucesso=1">
        <input type="hidden" name="CAMG.Socio.Categoria" id="categoria-input">

        <div class="form-row">
          <div class="input-component">
            <input type="text" id="nome" name="CAMG.Socio.Nome" required placeholder=" ">
            <label for="nome">Nome</label>
          </div>
          <div class="input-component">
            <input type="text" id="cc" name="CAMG.Socio.CC" required placeholder=" ">
            <label for="cc">Nº Identificação Civil</label>
          </div>
        </div>

        <div class="form-row">
          <div class="input-component">
            <input type="text" id="nif" name="CAMG.Socio.NIF" required placeholder=" ">
            <label for="nif">Nº Identificação Fiscal</label>
          </div>
          <div class="input-component">
            <input type="date" id="nascimento" name="CAMG.Socio.Nascimento" required placeholder=" ">
            <label for="nascimento">Data de Nascimento</label>
          </div>
        </div>

        <div class="form-row">
          <div class="input-component">
            <input type="email" id="email" name="CAMG.Socio.Email" required placeholder=" ">
            <label for="email">Email</label>
          </div>
          <div class="input-component">
            <input type="text" id="morada" name="CAMG.Socio.Morada" required placeholder=" ">
            <label for="morada">Morada</label>
          </div>
        </div>

        <div class="form-row">
          <div class="input-component">
            <input type="text" id="codigo-postal" name="CAMG.Socio.CodigoPostal" required placeholder=" ">
            <label for="codigo-postal">Código Postal</label>
          </div>
          <div class="input-component">
            <input type="text" id="freguesia" name="CAMG.Socio.Freguesia" required placeholder=" ">
            <label for="freguesia">Freguesia</label>
          </div>
          <div class="input-component">
            <input type="text" id="concelho" name="CAMG.Socio.Concelho" required placeholder=" ">
            <label for="concelho">Concelho</label>
          </div>
        </div>

        <div class="form-row">
          <div class="input-component">
            <input type="text" id="distrito" name="CAMG.Socio.Distrito" required placeholder=" ">
            <label for="distrito">Distrito</label>
          </div>
          <div class="input-component">
            <input type="text" id="pais" name="CAMG.Socio.Pais" value="Portugal" required placeholder=" ">
            <label for="pais">País</label>
          </div>
        </div>

        <div class="form-row">
          <div class="input-component select-component">
            <select id="categoria" name="CAMG.Socio.CategoriaSelect" required>
              <option value="" disabled selected></option>
              <option value="socio-atleta">Sócio Atleta</option>
              <option value="socio-apoiante">Sócio Apoiante</option>
            </select>
            <span class="select-arrow">▼</span>
            <label for="categoria">Categoria de Sócio</label>
          </div>
          <div class="input-component"></div>
        </div>

        <div class="checkbox-component">
          <label class="checkbox-label">
            <input type="checkbox" name="CAMG.Socio.Consentimento" required>
            <span class="checkmark"></span>
            Autorizo o tratamento dos meus dados pessoais para os fins associativos do CAMG, nos termos da Política de Privacidade.
          </label>
        </div>

        <div class="captcha-component">
          <div class="captcha-question" id="captcha-question"></div>
          <div class="input-component">
            <input type="text" id="captcha" name="CAMG.Socio.Captcha" required placeholder=" " autocomplete="off">
            <label for="captcha">Resposta</label>
          </div>
          <input type="hidden" id="captcha-answer" name="CAMG.Socio.CaptchaAnswer">
        </div>

        <button type="submit" class="btn-submit" id="form-btn">
          Submeter Inscrição
          <span class="arrow">→</span>
        </button>
      </form>
    </div>

  </div>

</main>

<script>
function selectLevel(el) {
  document.querySelectorAll('.level-card').forEach(function(c) { c.classList.remove('selected'); });
  el.classList.add('selected');
  document.getElementById('categoria-input').value = el.getAttribute('data-value');
  var sel = document.getElementById('categoria');
  for (var i = 0; i < sel.options.length; i++) {
    if (sel.options[i].value === el.getAttribute('data-value')) {
      sel.selectedIndex = i;
      break;
    }
  }
}

(function() {
  var form = document.getElementById('socio-form');
  var status = document.getElementById('form-status');
  var btn = document.getElementById('form-btn');

  if (!form) return;

  var urlParams = new URLSearchParams(window.location.search);
  if (urlParams.get('sucesso') === '1') {
    status.className = 'form-status success';
    status.textContent = 'Inscrição enviada com sucesso! Entraremos em contacto consigo em breve.';
    form.reset();
    document.querySelectorAll('.level-card').forEach(function(c) { c.classList.remove('selected'); });
  } else if (urlParams.get('sucesso') === '0') {
    status.className = 'form-status error';
    status.textContent = 'Ocorreu um erro ao enviar a sua inscrição. Por favor, tente novamente.';
  }

  var captchaAnswer = document.getElementById('captcha-answer');
  var captchaQuestion = document.getElementById('captcha-question');

  function generateCaptcha() {
    var ops = ['+', '\u2212'];
    var op = ops[Math.floor(Math.random() * ops.length)];
    var a, b, answer;
    if (op === '+') {
      a = Math.floor(Math.random() * 20) + 1;
      b = Math.floor(Math.random() * 20) + 1;
      answer = a + b;
    } else {
      a = Math.floor(Math.random() * 15) + 5;
      b = Math.floor(Math.random() * a) + 1;
      answer = a - b;
    }
    captchaQuestion.textContent = a + ' ' + op + ' ' + b + ' = ?';
    captchaAnswer.value = answer;
  }
  generateCaptcha();

  form.addEventListener('submit', function(e) {
    var userAnswer = document.getElementById('captcha').value.trim();
    if (parseInt(userAnswer) !== parseInt(captchaAnswer.value)) {
      e.preventDefault();
      document.getElementById('captcha').focus();
      captchaQuestion.style.borderColor = '#ef4444';
      captchaQuestion.style.color = '#ef4444';
      setTimeout(function() {
        captchaQuestion.style.borderColor = '';
        captchaQuestion.style.color = '';
      }, 2000);
      return;
    }
    btn.disabled = true;
    btn.textContent = 'A enviar…';
  });

  var categoriaSelect = document.getElementById('categoria');
  categoriaSelect.addEventListener('change', function() {
    var val = this.value;
    document.querySelectorAll('.level-card').forEach(function(c) {
      if (c.getAttribute('data-value') === val) {
        c.classList.add('selected');
        document.getElementById('categoria-input').value = val;
      } else {
        c.classList.remove('selected');
      }
    });
  });
})();
</script>

</body>
</html>
