<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Painel de Gestão Diretiva | CAMG</title>
    <link rel="icon" type="image/png" href="../assets/images/favicon.png">
    <style>
        :root {
            --bg-app: #0c0c0e;
            --bg-card: #141417;
            --bg-field: #1d1d22;
            --border-subtle: #2d2d34;
            --brand-yellow: #facc15;
            --brand-yellow-hover: #eab308;
            --brand-yellow-alpha: rgba(250, 204, 21, 0.06);
            --text-main: #f4f4f7;
            --text-muted: #a1a1aa;
            --text-dark: #09090b;
            --status-green: #10b981;
            --transition-smooth: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            background-color: var(--bg-app);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            padding: 0;
            -webkit-user-select: none;
            user-select: none;
        }

        /* --- TELA DE LOGIN ENTERPRISE --- */
        .auth-container {
            width: 100%;
            max-width: 420px;
            padding: 2rem 1.5rem;
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            text-align: center;
            animation: fadeIn 0.4s ease-out;
            margin: 1rem;
        }

        .auth-logo {
            max-width: 100px;
            height: auto;
            margin-bottom: 1.5rem;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3));
        }

        .auth-container h2 {
            font-size: 1.35rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 0.35rem;
        }

        .auth-container p {
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-bottom: 2rem;
        }

        .form-control-group {
            text-align: left;
            margin-bottom: 1.5rem;
        }

        .form-control-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .input-text {
            width: 100%;
            padding: 0.875rem 1rem;
            background: var(--bg-field);
            border: 1px solid var(--border-subtle);
            color: var(--text-main);
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: var(--transition-smooth);
            -webkit-appearance: none;
            appearance: none;
        }

        .input-text:focus {
            border-color: var(--brand-yellow);
            box-shadow: 0 0 0 3px rgba(250, 204, 21, 0.12);
        }

        .btn-submit-pro {
            width: 100%;
            padding: 0.875rem;
            background: var(--brand-yellow);
            color: var(--text-dark);
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: var(--transition-smooth);
            -webkit-appearance: none;
            appearance: none;
            min-height: 44px;
        }

        .btn-submit-pro:active {
            background: var(--brand-yellow-hover);
            transform: translateY(-1px);
        }

        @media (hover: hover) {
            .btn-submit-pro:hover {
                background: var(--brand-yellow-hover);
                transform: translateY(-1px);
            }
        }

        .error-banner-pro {
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid #ef4444;
            color: #f87171;
            padding: 0.875rem;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-top: 1.25rem;
            display: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        input, button, textarea, select {
            font-size: 16px !important;
        }
    </style>
</head>
<body>

    <div class="auth-container" id="authScreen">
        <img src="../assets/images/logo.png" alt="CAMG Logo" class="auth-logo" onerror="this.style.display='none'">
        <h2>Área de Direção</h2>
        <p>Acesso restrito aos membros oficiais do CAMG</p>
        
        <div class="form-control-group">
            <label for="masterKey">Chave de Segurança</label>
            <input type="password" id="masterKey" class="input-text" placeholder="••••••••" onkeydown="if(event.key === 'Enter') autenticarUtilizador()" autocomplete="off">
        </div>
        
        <button class="btn-submit-pro" onclick="autenticarUtilizador()">
            <span>Validar Acesso</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
        </button>
        <div class="error-banner-pro" id="authError">A chave inserida está incorreta.</div>
    </div>

    <script>
        const CHAVES_AUTORIZADAS = [
            "camg1995", 
            "camg", 
            "Camg1995"
        ];

        function autenticarUtilizador() {
            const inputChave = document.getElementById('masterKey').value;
            const erroContainer = document.getElementById('authError');

            if (CHAVES_AUTORIZADAS.includes(inputChave)) {
                // Guarda uma flag na sessão do browser para validar que o login foi feito
                sessionStorage.setItem('camg_autenticado', 'true');
                // Redireciona para a página do painel
                window.location.href = 'painel';
            } else {
                erroContainer.style.display = 'block';
                document.getElementById('masterKey').value = '';
            }
        }
    </script>
</body>
</html>
